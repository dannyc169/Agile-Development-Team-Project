<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UWA StudySync</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome 6 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-dark: #4338CA;
            --primary-light: #6366F1;
        }
        
        /* Animated background shapes */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            z-index: -1;
        }
        
        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        
        .shape:nth-child(1) {
            width: 150px;
            height: 150px;
            background-color: white;
            border-radius: 50%;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .shape:nth-child(2) {
            width: 100px;
            height: 100px;
            background-color: white;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }
        
        .shape:nth-child(3) {
            width: 120px;
            height: 120px;
            background-color: white;
            border-radius: 50%;
            bottom: 20%;
            left: 5%;
            animation-delay: 4s;
        }
        
        .shape:nth-child(4) {
            width: 80px;
            height: 80px;
            background-color: white;
            top: 30%;
            right: 5%;
            animation-delay: 1s;
        }
        
        .shape:nth-child(5) {
            width: 130px;
            height: 130px;
            background-color: white;
            border-radius: 50%;
            bottom: 10%;
            right: 20%;
            animation-delay: 3s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            25% {
                transform: translateY(-20px) translateX(10px);
            }
            50% {
                transform: translateY(-40px) translateX(-10px);
            }
            75% {
                transform: translateY(-20px) translateX(15px);
            }
        }
        
        .form-input {
            position: relative;
        }
        
        .form-input input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid #E5E7EB;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-input input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .form-input input.invalid {
            border-color: #EF4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
        
        .form-input input.valid {
            border-color: #10B981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .form-input i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            pointer-events: none;
        }
        
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9CA3AF;
            transition: color 0.3s ease;
        }
        
        .password-toggle:hover {
            color: var(--primary-color);
        }
        
        /* Password Strength Indicator */
        .strength-container {
            margin-top: 0.5rem;
        }
        
        .strength-bar {
            height: 4px;
            background-color: #E5E7EB;
            border-radius: 9999px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            transition: width 0.3s ease, background-color 0.3s ease;
            background-color: #EF4444;
        }
        
        .strength-fill.weak {
            width: 33%;
            background-color: #EF4444;
        }
        
        .strength-fill.fair {
            width: 66%;
            background-color: #F59E0B;
        }
        
        .strength-fill.strong {
            width: 100%;
            background-color: #10B981;
        }
        
        .strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            color: #6B7280;
            transition: color 0.3s ease;
        }
        
        .strength-text.weak {
            color: #EF4444;
        }
        
        .strength-text.fair {
            color: #F59E0B;
        }
        
        .strength-text.strong {
            color: #10B981;
        }
        
        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }
        
        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }
        
        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #E5E7EB;
        }
        
        .divider-text {
            padding: 0 0.75rem;
            color: #9CA3AF;
            font-size: 0.875rem;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen flex items-center justify-center p-4">
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    
    <!-- Register Card -->
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl p-10">
            <!-- Logo and Branding -->
            <div class="text-center mb-8">
                <div class="text-5xl mb-3">⚡</div>
                <h1 class="text-3xl font-bold text-gray-900 mb-2">StudySync</h1>
                <p class="text-gray-600 text-sm">Join our study community</p>
            </div>
            
            <!-- Register Form -->
            <form method="POST" action="#" class="space-y-4" id="registerForm">
                <!-- Full Name Input -->
                <div>
                    <label for="fullName" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <div class="form-input">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            placeholder="Enter your full name" 
                            required
                        >
                    </div>
                </div>
                
                <!-- UWA Student ID Input -->
                <div>
                    <label for="studentId" class="block text-sm font-medium text-gray-700 mb-2">UWA Student ID</label>
                    <div class="form-input">
                        <i class="fas fa-id-card"></i>
                        <input 
                            type="text" 
                            id="studentId" 
                            name="studentId" 
                            placeholder="22xxxxxxx" 
                            required
                        >
                    </div>
                </div>
                
                <!-- Email Input -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <div class="form-input">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email" 
                            required
                        >
                    </div>
                </div>
                
                <!-- Password Input -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <div class="form-input">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter a strong password" 
                            required
                        >
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="passwordToggle"
                            onclick="togglePasswordVisibility('password', 'passwordToggle')"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div class="strength-container">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Weak</div>
                    </div>
                </div>
                
                <!-- Confirm Password Input -->
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                    <div class="form-input">
                        <i class="fas fa-shield"></i>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Re-enter your password" 
                            required
                        >
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="confirmPasswordToggle"
                            onclick="togglePasswordVisibility('confirmPassword', 'confirmPasswordToggle')"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Terms Checkbox -->
                <div class="flex items-center gap-3 pt-2">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms" 
                        class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500"
                        required
                    >
                    <label for="terms" class="text-sm text-gray-700">
                        I agree to 
                        <a href="#" class="text-indigo-600 hover:text-indigo-700 font-medium">Terms of Service</a>
                    </label>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="submit-btn mt-6" id="submitBtn">
                    <span>Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">or</div>
                <div class="divider-line"></div>
            </div>
            
            <!-- Sign In Link -->
            <p class="text-center text-sm text-gray-600">
                Already have an account? 
                <a href="/login" class="text-indigo-600 hover:text-indigo-700 font-semibold">
                    Sign in
                </a>
            </p>
        </div>
    </div>
    
    <!-- Validation and Strength Indicator Scripts -->
    <script>
        // Password Strength Calculator
        function calculatePasswordStrength(password) {
            let strength = 0;
            
            // Length-based scoring
            if (password.length >= 8) strength += 1;
            if (password.length >= 12) strength += 1;
            if (password.length >= 16) strength += 1;
            
            // Character variety scoring
            if (/[a-z]/.test(password)) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 1;
            
            // Return strength level
            if (strength < 2) return 'weak';
            if (strength < 5) return 'fair';
            return 'strong';
        }
        
        // Update Password Strength Indicator
        function updatePasswordStrength(password) {
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            
            if (!password) {
                strengthFill.className = 'strength-fill';
                strengthText.className = 'strength-text';
                strengthText.textContent = 'Weak';
                return;
            }
            
            const strength = calculatePasswordStrength(password);
            strengthFill.className = `strength-fill ${strength}`;
            strengthText.className = `strength-text ${strength}`;
            strengthText.textContent = strength.charAt(0).toUpperCase() + strength.slice(1);
        }
        
        // Toggle Password Visibility
        function togglePasswordVisibility(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);
            
            if (input.type === 'password') {
                input.type = 'text';
                toggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                input.type = 'password';
                toggle.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }
        
        // Validation Functions
        function validateFullName(value) {
            return value.trim().length >= 2;
        }
        
        function validateStudentId(value) {
            return /^22\d{7}$/.test(value);
        }
        
        function validateEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }
        
        function validatePassword(value) {
            return value.length >= 8;
        }
        
        function validatePasswordMatch(password, confirmPassword) {
            return password === confirmPassword && password.length > 0;
        }
        
        // Apply Validation Styling
        function applyValidationStyle(input, isValid) {
            if (isValid === null) {
                input.classList.remove('invalid', 'valid');
            } else if (isValid) {
                input.classList.remove('invalid');
                input.classList.add('valid');
            } else {
                input.classList.remove('valid');
                input.classList.add('invalid');
            }
        }
        
        // Set up Blur Event Listeners
        const fullNameInput = document.getElementById('fullName');
        const studentIdInput = document.getElementById('studentId');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        
        fullNameInput.addEventListener('blur', function() {
            const isValid = validateFullName(this.value);
            applyValidationStyle(this, isValid ? isValid : null);
        });
        
        studentIdInput.addEventListener('blur', function() {
            const isValid = this.value ? validateStudentId(this.value) : null;
            applyValidationStyle(this, isValid);
        });
        
        emailInput.addEventListener('blur', function() {
            const isValid = this.value ? validateEmail(this.value) : null;
            applyValidationStyle(this, isValid);
        });
        
        passwordInput.addEventListener('blur', function() {
            const isValid = validatePassword(this.value);
            applyValidationStyle(this, isValid ? isValid : null);
        });
        
        passwordInput.addEventListener('input', function() {
            updatePasswordStrength(this.value);
        });
        
        confirmPasswordInput.addEventListener('blur', function() {
            const isValid = validatePasswordMatch(passwordInput.value, this.value);
            applyValidationStyle(this, isValid ? isValid : null);
        });
        
        // Form Submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate all fields
            const fullNameValid = validateFullName(fullNameInput.value);
            const studentIdValid = validateStudentId(studentIdInput.value);
            const emailValid = validateEmail(emailInput.value);
            const passwordValid = validatePassword(passwordInput.value);
            const confirmPasswordValid = validatePasswordMatch(passwordInput.value, confirmPasswordInput.value);
            const termsChecked = document.getElementById('terms').checked;
            
            applyValidationStyle(fullNameInput, fullNameValid);
            applyValidationStyle(studentIdInput, studentIdValid);
            applyValidationStyle(emailInput, emailValid);
            applyValidationStyle(passwordInput, passwordValid);
            applyValidationStyle(confirmPasswordInput, confirmPasswordValid);
            
            if (fullNameValid && studentIdValid && emailValid && passwordValid && confirmPasswordValid && termsChecked) {
                // Form is valid - in a real app, this would submit to the server
                console.log('Form is valid! Ready to submit.');
                // Optionally show a success message
                alert('Account created successfully! (This is a demo)');
            }
        });
    </script>
</body>
</html>
